# fly.toml app configuration file generated for biassemble-engine on 2026-06-29T07:17:43Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'biassemble-engine'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '5m0s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
