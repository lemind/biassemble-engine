app = "biassemble-engine"
primary_region = "fra"

[build]

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0

[[http_service.checks]]
grace_period = "300s"
interval = "30s"
method = "GET"
path = "/health"
timeout = "10s"

[[vm]]
memory = "512mb"
cpu_kind = "shared"
cpus = 1
