name: Build llama-cpp-python wheel

# ONE-TIME (re-runnable) job: compile a portable prebuilt wheel of llama-cpp-python
# and commit it to vendor/wheels/. The HF Space Docker build then INSTALLS that wheel
# in seconds instead of compiling from source — which OOM-kills on HF's build machine.
# GitHub's runners have ~16GB RAM, so the compile succeeds here comfortably.
#
# Runs on ubuntu-22.04 (glibc 2.35) — modern enough for GitHub's Node-24 tooling, and
# <= the deploy image's glibc (Debian bookworm, 2.36), so the resulting wheel loads
# there. auditwheel then bundles any shared libs and tags it manylinux for portability.
# (Running inside an old manylinux container instead breaks GitHub's Node runner —
# its glibc 2.17 is too old for Node 24.)
#
# Run from the Actions tab -> "Build llama-cpp-python wheel" -> Run workflow.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "llama-cpp-python version to build"
        default: "0.3.19"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build the wheel from source, then repair to manylinux
        env:
          # Portable build (runtime SIMD dispatch, no -march=native -> no SIGILL when it
          # runs on a different CPU), no curl support (models fetched via huggingface_hub).
          CMAKE_ARGS: "-DGGML_NATIVE=OFF -DLLAMA_CURL=OFF"
        run: |
          set -eux
          python -m pip install --upgrade pip cmake ninja auditwheel patchelf
          python -m pip wheel "llama-cpp-python==${{ github.event.inputs.version }}" \
            --no-binary llama-cpp-python -w /tmp/raw
          # auditwheel bundles external .so deps and stamps the lowest compatible
          # manylinux tag based on the glibc symbols actually used.
          auditwheel repair /tmp/raw/llama_cpp_python-*.whl -w vendor/wheels
          rm -f vendor/wheels/.gitkeep
          ls -la vendor/wheels

      - name: Upload wheel as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-python-wheel
          path: vendor/wheels/*.whl

      - name: Commit the wheel to the repo
        run: |
          set -eux
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f vendor/wheels/*.whl
          git commit -m "chore: vendor prebuilt llama-cpp-python manylinux wheel" || { echo "no changes"; exit 0; }
          git push
