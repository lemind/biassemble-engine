name: Pytest

# Tier 1 (adr/004-ci-metrics-gate.md) — every push, every PR, no path filter.
# Free, deterministic, no network/DB/model download: tests/ has zero DB fixtures
# and no conftest.py (verified in specs/005-ci-metrics-gate/research.md), so this
# closes the actual gap — today NOTHING runs automatically on this repo.

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-22.04
    steps:
      # lfs: true is required — pyproject.toml's [tool.uv.sources] pins
      # llama-cpp-python to vendor/wheels/*.whl (Git LFS-tracked). Without this,
      # checkout leaves only the LFS pointer file and `uv sync` fails trying to
      # unzip it ("Invalid zip file structure") — this bit every one of the
      # three CI workflows the first time they actually ran on GitHub Actions.
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: astral-sh/setup-uv@v3

      # pytest lives under [project.optional-dependencies] "dev" (setuptools-style
      # extras) — a different mechanism from [dependency-groups] "dev" (PEP 735,
      # which only has httpx[socks]). Both are confusingly named "dev". Plain
      # `uv sync` only installs the latter, so pytest was never actually
      # installed (caught via a real failed run: "Failed to spawn: pytest").
      - run: uv sync --extra dev

      # Settings.database_url/rag_api_key (src/config.py) are required fields with
      # no default — merely importing the app (several test modules do) fails
      # pydantic validation without *some* value. No test in tests/ makes a real
      # DB/API call (verified: zero asyncpg/create_pool usage), so placeholders
      # satisfy validation without needing a real secret — caught via a real
      # failed run ("Field required" on database_url/rag_api_key at collection).
      - run: uv run pytest tests/ -v
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          RAG_API_KEY: "ci-placeholder"
