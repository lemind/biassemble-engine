name: Retrieval Regression Gate

# Tier 2a (adr/004-ci-metrics-gate.md) — PRs touching retrieval-critical code only.
# Runs the real eval harness against THIS PR's own checked-out code, over live
# Supabase, and blocks merge on a per-(group, metric) regression vs. the latest
# promoted baseline (scripts/check_regression.py — adr/004 §4's exact formula).
#
# Requires DATABASE_URL as a repo secret (does not exist yet — see README.md's
# "## CI" section / adr/004 §5). Every run fails at the connection step until
# a repo admin provisions it.

# No path filter on the trigger itself — this job is a REQUIRED branch-protection
# check (adr/004 §9 / T012), and a required check that never fires because its
# trigger's `paths:` didn't match blocks merge FOREVER (GitHub shows "Expected —
# waiting for status", not "not applicable" — confirmed directly: a PR touching
# only specs/*.md sat BLOCKED with no `eval` check in its rollup at all, even
# though the old path-filtered trigger correctly never ran it). Fix: always
# trigger, but skip the real work via dorny/paths-filter below when nothing
# retrieval-critical changed — the job still always reports a real conclusion.
on:
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-22.04
    steps:
      # lfs: true is required — pyproject.toml's [tool.uv.sources] pins
      # llama-cpp-python to this exact path, which is Git LFS-tracked. Without
      # this, checkout leaves only the LFS pointer file and `uv sync` fails
      # trying to unzip it (caught via a real failed run on this PR).
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Check whether retrieval-critical paths changed
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            retrieval:
              - "src/retrieval/**"
              - "src/nli/**"
              - "src/llm/**"
              - "src/selection/**"
              - "src/evaluation/**"
              - "evaluations/**"
              - "hypotheses/**"

      - if: steps.filter.outputs.retrieval != 'true'
        run: echo "No retrieval-critical paths changed — skipping the real eval, reporting success."

      - if: steps.filter.outputs.retrieval == 'true'
        uses: astral-sh/setup-uv@v3

      # uv sync alone installs llama-cpp-python from vendor/wheels/*.whl now that
      # LFS content is present — pyproject.toml's [tool.uv.sources] already points
      # there, so a separate explicit `uv pip install` step would be redundant.
      - if: steps.filter.outputs.retrieval == 'true'
        run: uv sync

      - name: Install psql client (PSQL_SEARCH=true path needs the psql binary)
        if: steps.filter.outputs.retrieval == 'true'
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      # llm_union (this PR's default strategy, per space-vars.env) loads a ~2.5GB
      # Gemma-3-4B GGUF from Hugging Face at runtime. Cache it so only the first
      # run after a cache-miss pays that download; every PR after that is fast.
      - name: Cache Hugging Face model cache
        if: steps.filter.outputs.retrieval == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-gguf-google_gemma-3-4b-it-Q4_K_M

      # HACK(retrieval-gate.yml): PSQL_SEARCH=true spawns a `psql` subprocess that
      # connects directly to Supabase — this path exists in scripts/run_evaluation.py
      # to dodge a LOCAL DEV outbound SOCKS proxy (see that script's own comments).
      # GitHub-hosted runners have no such proxy, so this should just work, but that
      # is SPECULATIVE — never verified against a real GitHub Actions run yet.
      # REVISIT: if this step fails at the DB-connection stage (not auth, not
      # missing-secret), check whether Supabase's network restrictions or GitHub's
      # runner IP ranges are the actual blocker before assuming the code is wrong.
      # RAG_API_KEY isn't used by this script's own logic, but src/config.py's
      # Settings() is instantiated eagerly at import time and requires it with
      # no default — omitting it fails before the eval even starts (caught via
      # a real failed run: "Field required" on rag_api_key).
      - name: Run evaluation against this PR's code
        if: steps.filter.outputs.retrieval == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RAG_API_KEY: ${{ secrets.RAG_API_KEY }}
          PSQL_SEARCH: "true"
        run: uv run python scripts/run_evaluation.py --strategy llm_union

      - name: Compare against latest promoted baseline
        if: steps.filter.outputs.retrieval == 'true'
        run: |
          set -euo pipefail
          RUN_JSON=$(ls -1t evaluations/runs/run_*.json | head -1)
          BASELINE_JSON=$(ls -1 evaluations/baselines/baseline_*.json | sort | tail -1)
          echo "run=$RUN_JSON baseline=$BASELINE_JSON"
          set +e
          uv run python scripts/check_regression.py --run "$RUN_JSON" --baseline "$BASELINE_JSON"
          code=$?
          set -e
          if [ "$code" -eq 1 ]; then
            echo "::error::Retrieval quality regressed vs. the latest promoted baseline (see table above)."
            exit 1
          elif [ "$code" -eq 2 ]; then
            echo "::error::check_regression.py could not evaluate the run — infrastructure error, not a quality finding."
            exit 2
          elif [ "$code" -ne 0 ]; then
            # Fail closed, not open: an unrecognized exit code must not silently
            # fall through to a clean pass (this code has only ever returned
            # 0/1/2, but a future change adding a new code — or an unforeseen
            # crash — must not be misread as success here).
            echo "::error::check_regression.py exited with unrecognized code $code."
            exit "$code"
          fi
